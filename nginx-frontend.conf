server {
    listen 80;
    server_name localhost;

    # Onde estão os arquivos do React
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Rota principal: Serve o React e trata o roteamento do SPA (Single Page App)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Rota API: Redireciona tudo que começa com /api para o backend Python
    location /api {
        # 'backend' é o nome do serviço definido no docker-compose.yml
        proxy_pass http://backend:8000/api; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rota Auth/Upload: Caso você tenha rotas que não começam com /api (ex: /login)
    # Ajuste aqui conforme suas rotas do Flask. Pelo seu app.py, parece que /login e /upload
    # não estão dentro de /api no registro dos Blueprints, mas o axios pode estar chamando direto.
    # Vou adicionar regras genéricas para cobrir seu app.py:
    
    location /login {
        proxy_pass http://backend:8000/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /upload {
        proxy_pass http://backend:8000/upload;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /download {
        proxy_pass http://backend:8000/download;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # Se houver outras rotas soltas no app.py, adicione aqui ou agrupe tudo sob /api no Flask.
}