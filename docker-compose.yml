services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mcd_backend
    restart: unless-stopped
    volumes:
      # Persiste a pasta de uploads (arquivos Excel)
      - mcd_dados_sistema:/app/arquivos_sistema
      
      # --- LINHA ADICIONADA PARA PERSISTÊNCIA DE USUÁRIOS ---
      # Mapeia o arquivo da VPS (esquerda) para o container (direita)
      - ./users.json:/app/users.json 
      
    environment:
      - JWT_SECRET_KEY=TroqueIssoPorUmaSenhaSuperSeguraNoServidor
      - APP_USERNAME=admin
      - APP_PASSWORD=admin
      # Caminhos internos do container (não mude isso)
      - PATH_GERAL=/app/arquivos_sistema/Planilha_Potabilidade.xlsx
      - PATH_VISA=/app/arquivos_sistema/Planilha_VISA.xlsx
      - PATH_HACCP=/app/arquivos_sistema/Planilha_HACCP.xlsx

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mcd_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Porta 8085 da VPS -> Porta 80 do Nginx interno
      - "8085:80"

volumes:
  mcd_dados_sistema:
